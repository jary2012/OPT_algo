name: Auto-merge single header

on:
  push:
    branches: [main]
    paths-ignore:
      - "version/**"
  workflow_dispatch:

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Merge all .hpp into version/opt_algo.hpp
        shell: bash
        run: |
          python3 << 'EOF'
          import os, re
          from pathlib import Path

          ROOT = Path(".")
          dirs = ["basic", "search", "dp", "string", "math",
                  "ds", "graph", "geometry", "misc"]
          out_file = ROOT / "version" / "opt_algo.hpp"
          out_file.parent.mkdir(parents=True, exist_ok=True)

          # 收集所有 .hpp 文件（按路径排序保证稳定）
          files = []
          for d in dirs:
              dp = ROOT / d
              if dp.is_dir():
                  for f in sorted(dp.rglob("*.hpp")):
                      files.append(f)

          with open(out_file, "w", encoding="utf-8") as out:
              out.write("// AUTO-GENERATED by GitHub Actions, DO NOT EDIT.\n")
              out.write("// 包含 OPT_algo 全部算法。\n")
              out.write("#pragma once\n\n")
              out.write("namespace opt_algo {\n\n")

              for f in files:
                  out.write(f"// ==== {f} ====\n")
                  with open(f, "r", encoding="utf-8") as fin:
                      raw = fin.read()

                  # 移除所有 #pragma once 行（含前后空白）
                  raw = re.sub(r'^\s*#pragma\s+once\s*$\n?', '', raw, flags=re.MULTILINE)

                  # 提取 namespace opt_algo { ... } 内部的代码
                  # 匹配 namespace opt_algo 声明（可能跨行，允许注释）
                  m = re.search(r'namespace\s+opt_algo\s*\{', raw)
                  if m:
                      start = m.end()   # 从 { 之后开始
                      depth = 0
                      i = start
                      while i < len(raw):
                          ch = raw[i]
                          if ch == '{':
                              depth += 1
                          elif ch == '}':
                              if depth == 0:
                                  break   # 找到了匹配的外层 }
                              depth -= 1
                          i += 1
                      # 提取内部代码（去掉首尾空白）
                      inner = raw[start:i].strip()
                      out.write(inner)
                      out.write("\n\n")
                  else:
                      # 极少情况：文件没有包裹在 namespace opt_algo 中
                      # 直接写入全部内容（除去 pragma once）
                      out.write(raw.strip() + "\n\n")

              out.write("} // namespace opt_algo\n")

          print(f"✅ 合并完成：{out_file}  ({len(files)} 个文件)")
          EOF

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version/opt_algo.hpp
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "🤖 auto-merge: update single header"
            git push
          fi
