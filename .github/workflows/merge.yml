name: Auto-merge single header

on:
  push:
    branches: [main]
    paths-ignore:
      - "version/**"
  workflow_dispatch:

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Merge all .hpp into version/opt_algo.hpp
        run: |
          python3 << 'EOF'
          import os, sys
          from pathlib import Path

          ROOT = Path(".")
          dirs = ["basic", "search", "dp", "string", "math",
                  "ds", "graph", "geometry", "misc"]
          out_file = ROOT / "version" / "opt_algo.hpp"
          out_file.parent.mkdir(parents=True, exist_ok=True)

          # 收集所有 .hpp 文件 (按路径排序)
          files = []
          for d in dirs:
              dp = ROOT / d
              if dp.is_dir():
                  for f in sorted(dp.rglob("*.hpp")):
                      files.append(f)

          with open(out_file, "w", encoding="utf-8") as out:
              out.write("// AUTO-GENERATED by GitHub Actions, DO NOT EDIT.\n")
              out.write("// 包含 OPT_algo 全部算法。\n")
              out.write("#pragma once\n\n")
              out.write("namespace opt_algo {\n\n")

              for f in files:
                  out.write(f"// ==== {f} ====\n")
                  with open(f, "r", encoding="utf-8") as fin:
                      content = fin.read()
                  lines = content.splitlines()
                  cleaned = []
                  in_ns = False
                  depth = 0
                  for line in lines:
                      # 跳过 #pragma once
                      if line.strip() == "#pragma once":
                          continue
                      if not in_ns:
                          # 发现 namespace opt_algo 声明
                          if 'namespace opt_algo' in line:
                              in_ns = True
                              # 如果声明行自带 { ，也要计数
                              if '{' in line:
                                  depth += line.count('{') - line.count('}')
                              continue
                          else:
                              cleaned.append(line)
                      else:
                          # 已经在命名空间内部，跟踪大括号
                          depth += line.count('{') - line.count('}')
                          if depth <= 0:
                              in_ns = False
                              continue
                          cleaned.append(line)
                  out.write('\n'.join(cleaned))
                  out.write("\n\n")

              out.write("} // namespace opt_algo\n")

          print(f"✅ 合并完成：{out_file}  ({len(files)} 个文件)")
          EOF

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version/opt_algo.hpp
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "🤖 auto-merge: update single header"
            git push
          fi
