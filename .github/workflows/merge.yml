name: Auto-merge single header

on:
  push:
    branches: [main]
    paths-ignore:
      - "version/**"
  workflow_dispatch:

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Merge all .hpp files into version/opt_algo.hpp
        shell: bash
        run: |
          # 收集所有分类目录下的 .hpp 文件
          dirs=("basic" "search" "dp" "string" "math" "ds" "graph" "geometry" "misc")

          # 输出文件路径
          out="version/opt_algo.hpp"
          mkdir -p "$(dirname "$out")"

          # 写入头部
          echo "// AUTO-GENERATED by GitHub Actions, DO NOT EDIT." > "$out"
          echo "// 包含 OPT_algo 全部算法。" >> "$out"
          echo "#pragma once" >> "$out"
          echo "" >> "$out"

          # 遍历每个分类目录，收集其中的 .hpp 文件（按路径排序）
          for dir in "${dirs[@]}"; do
            if [ -d "$dir" ]; then
              find "$dir" -type f -name "*.hpp" -print0 | sort -z | while IFS= read -r -d '' file; do
                # 输出文件名注释
                echo "// ==== $file ====" >> "$out"
                # 写入文件内容，过滤掉原有的 #pragma once
                grep -v '^#pragma once' "$file" >> "$out"
                echo "" >> "$out"
              done
            fi
          done

          echo "✅ 合并完成：$out"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version/opt_algo.hpp
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "🤖 auto-merge: update single header"
            git push
          fi
